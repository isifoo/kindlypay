<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F0E8; --surface: #FDFAF4; --ink: #1A1612; --ink2: #6B6459; --ink3: #A89F95;
    --c1: #C4432A; --c1l: #F5E8E5; --c2: #2A6EC4; --c2l: #E5EEF5;
    --par: #2A8C5A; --parl: #E5F5ED; --border: rgba(26,22,18,0.1); --rad: 16px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:12px; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--ink2); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  #who-screen { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:32px 24px; gap:12px; }
  .who-title { font-family:'DM Serif Display',serif; font-size:28px; text-align:center; margin-bottom:4px; }
  .who-sub { font-size:14px; color:var(--ink2); margin-bottom:16px; text-align:center; }
  .who-btn { width:100%; max-width:320px; padding:18px 24px; border:1.5px solid var(--border); border-radius:var(--rad); background:var(--surface); font-family:'DM Sans',sans-serif; font-size:16px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:14px; transition:transform 0.15s, box-shadow 0.15s; }
  .who-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.08); }
  .dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }

  #app { display:none; flex-direction:column; min-height:100vh; }
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .header-title { font-family:'DM Serif Display',serif; font-size:20px; }
  .who-badge { font-size:12px; font-weight:500; padding:4px 10px; border-radius:20px; }
  .switch-btn { font-size:12px; color:var(--ink3); background:none; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; text-decoration:underline; margin-top:3px; }

  .cards { padding:24px 20px 12px; display:flex; flex-direction:column; gap:14px; }
  .card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--rad); padding:22px 22px 18px; cursor:pointer; transition:transform 0.15s, box-shadow 0.15s; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; border-radius:4px 0 0 4px; }
  .card.c1::before { background:var(--c1); }
  .card.c2::before { background:var(--c2); }
  .card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
  .card-name { font-size:13px; font-weight:500; color:var(--ink2); letter-spacing:0.04em; text-transform:uppercase; margin-bottom:8px; }
  .card-balance { font-family:'DM Serif Display',serif; font-size:42px; line-height:1; margin-bottom:6px; }
  .card-balance.neg { color:var(--c1); }
  .card-balance.zero { color:var(--ink3); }
  .card-sub { font-size:13px; color:var(--ink3); margin-bottom:14px; }
  .history-link { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:500; padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:none; cursor:pointer; font-family:'DM Sans',sans-serif; color:var(--ink2); transition:background 0.15s; position:relative; z-index:2; }
  .history-link:hover { background:var(--bg); }

  .actions { padding:4px 20px 20px; display:flex; flex-direction:column; gap:10px; }
  .section-label { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink3); padding:4px 0 2px; }
  .action-btn { width:100%; padding:16px 20px; border-radius:12px; border:none; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:10px; color:white; transition:opacity 0.15s, transform 0.12s; }
  .action-btn:hover { opacity:0.88; transform:translateY(-1px); }
  .btn-par { background:var(--par); }

  #history-screen { display:none; flex-direction:column; min-height:100vh; }
  .hist-header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 20px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:10; }
  .back-btn { background:none; border:none; font-size:24px; cursor:pointer; color:var(--ink); line-height:1; }
  .hist-title { font-family:'DM Serif Display',serif; font-size:20px; }
  .hist-big { font-family:'DM Serif Display',serif; font-size:52px; text-align:center; padding:28px 20px 6px; }
  .hist-big.neg { color:var(--c1); }
  .hist-label { text-align:center; font-size:13px; color:var(--ink3); padding-bottom:24px; }
  .entries { padding:0 20px 100px; }
  .month-label { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink3); padding:16px 0 8px; }
  .entry { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:8px; }
  .entry-desc { font-size:15px; font-weight:500; margin-bottom:3px; }
  .entry-date { font-size:12px; color:var(--ink3); }
  .entry-amt { font-size:17px; font-weight:600; white-space:nowrap; }
  .entry-amt.exp { color:var(--c1); }
  .entry-amt.pay { color:var(--par); }
  .empty { text-align:center; padding:48px 20px; color:var(--ink3); font-size:15px; }

  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:flex-end; justify-content:center; }
  .overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:20px 20px 0 0; padding:28px 24px 44px; width:100%; max-width:480px; animation:slideUp 0.25s ease; }
  @keyframes slideUp { from { transform:translateY(60px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .modal-title { font-family:'DM Serif Display',serif; font-size:22px; margin-bottom:4px; }
  .modal-sub { font-size:13px; color:var(--ink2); margin-bottom:22px; }
  .modal label { display:block; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink2); margin-bottom:6px; }
  .modal input, .modal select { width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:16px; background:var(--bg); color:var(--ink); outline:none; margin-bottom:4px; -webkit-appearance:none; appearance:none; }
  .modal input:focus, .modal select:focus { border-color:var(--ink2); }
  .opt-tag { font-size:11px; color:var(--ink3); margin-bottom:14px; display:block; }
  .modal-btns { display:flex; gap:10px; margin-top:8px; }
  .modal-ok { flex:1; padding:15px; border-radius:12px; border:none; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; color:white; }
  .modal-cancel { padding:15px 20px; border-radius:12px; border:1.5px solid var(--border); background:none; font-family:'DM Sans',sans-serif; font-size:15px; cursor:pointer; color:var(--ink2); }

  #toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:var(--ink); color:white; padding:10px 20px; border-radius:20px; font-size:14px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
  #toast.show { opacity:1; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--ink3)">Connecting…</div>
</div>

<div id="who-screen">
  <div class="who-title">Family Ledger</div>
  <div class="who-sub">Who's opening the app?</div>
  <button class="who-btn" onclick="setUser('parent')"><span class="dot" style="background:var(--par)"></span><span>Parent</span></button>
  <button class="who-btn" onclick="setUser('child1')"><span class="dot" style="background:var(--c1)"></span><span>Muly</span></button>
  <button class="who-btn" onclick="setUser('child2')"><span class="dot" style="background:var(--c2)"></span><span>Nina</span></button>
</div>

<div id="app">
  <div class="header">
    <div class="header-title">Family Ledger</div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
      <div class="who-badge" id="who-badge"></div>
      <button class="switch-btn" onclick="switchUser()">switch</button>
    </div>
  </div>
  <div class="cards">
    <div class="card c1" onclick="openExpModal('child1')">
      <div class="card-name">Muly</div>
      <div class="card-balance zero" id="c1-bal">$0.00</div>
      <div class="card-sub" id="c1-sub">All settled up</div>
      <button class="history-link" onclick="openHistory('child1'); event.stopPropagation()">History ›</button>
    </div>
    <div class="card c2" onclick="openExpModal('child2')">
      <div class="card-name">Nina</div>
      <div class="card-balance zero" id="c2-bal">$0.00</div>
      <div class="card-sub" id="c2-sub">All settled up</div>
      <button class="history-link" onclick="openHistory('child2'); event.stopPropagation()">History ›</button>
    </div>
  </div>
  <div class="actions" id="action-area"></div>
</div>

<div id="history-screen">
  <div class="hist-header">
    <button class="back-btn" onclick="closeHistory()">‹</button>
    <div class="hist-title" id="hist-title">History</div>
  </div>
  <div class="hist-big" id="hist-big">$0.00</div>
  <div class="hist-label" id="hist-label">current balance</div>
  <div class="entries" id="entries-list"></div>
</div>

<!-- Expense Modal -->
<div class="overlay" id="exp-modal">
  <div class="modal">
    <div class="modal-title">Add Expense</div>
    <div class="modal-sub" id="exp-modal-sub"></div>
    <label>Amount ($)</label>
    <input id="exp-amount" type="number" inputmode="decimal" placeholder="0.00" step="0.01" min="0.01">
    <label>Description</label>
    <input id="exp-desc" type="text" placeholder="e.g. Lunch, Uber, Shopping…">
    <span class="opt-tag">Optional</span>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('exp-modal')">Cancel</button>
      <button class="modal-ok" id="exp-ok" onclick="submitExpense()">Add Expense</button>
    </div>
  </div>
</div>

<!-- Payment Modal -->
<div class="overlay" id="pay-modal">
  <div class="modal">
    <div class="modal-title">Mark as Paid</div>
    <div class="modal-sub">Record a payment to a child</div>
    <label>Child</label>
    <select id="pay-child">
      <option value="child1">Muly</option>
      <option value="child2">Nina</option>
    </select>
    <label>Amount ($)</label>
    <input id="pay-amount" type="number" inputmode="decimal" placeholder="0.00" step="0.01" min="0.01">
    <label>Note</label>
    <input id="pay-note" type="text" placeholder="e.g. Weekly allowance">
    <span class="opt-tag">Optional</span>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('pay-modal')">Cancel</button>
      <button class="modal-ok" style="background:var(--par)" onclick="submitPayment()">Record Payment</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyD73MYTuHee6RTYs071XzOZUZnNS4jY9xw",
  authDomain: "gerry-movies.firebaseapp.com",
  projectId: "gerry-movies",
  storageBucket: "gerry-movies.firebasestorage.app",
  messagingSenderId: "951315023875",
  appId: "1:951315023875:web:2bffda76c834c097a1e636"
});
const db = firebase.firestore();

const NAMES = { child1: 'Muly', child2: 'Nina' };
let currentUser = null, historyChild = null, entries = [], expTarget = null;

function getBalance(child) {
  return entries.filter(e => e.child === child)
    .reduce((s, e) => s + (e.type === 'expense' ? -e.amount : e.amount), 0);
}
function fmt(n) { return (n < 0 ? '-$' : '$') + Math.abs(n).toFixed(2); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function renderBalances() {
  ['child1','child2'].forEach(c => {
    const bal = getBalance(c);
    const pre = c === 'child1' ? 'c1' : 'c2';
    const el = document.getElementById(pre+'-bal');
    el.textContent = fmt(bal);
    el.className = 'card-balance' + (bal < 0 ? ' neg' : bal === 0 ? ' zero' : '');
    const sub = document.getElementById(pre+'-sub');
    sub.textContent = bal === 0 ? 'All settled up' : bal < 0 ? `Owes ${fmt(Math.abs(bal))}` : `Ahead by ${fmt(bal)}`;
  });
  renderActions();
}

function renderActions() {
  const area = document.getElementById('action-area');
  if (!currentUser || currentUser !== 'parent') { area.innerHTML = ''; return; }
  area.innerHTML = `<div class="section-label">Record a payment</div>
    <button class="action-btn btn-par" onclick="openPayModal()"><span style="font-size:18px">💸</span> Mark as Paid</button>`;
}

function renderHistory(child) {
  const bal = getBalance(child);
  const big = document.getElementById('hist-big');
  big.textContent = fmt(bal);
  big.className = 'hist-big' + (bal < 0 ? ' neg' : '');
  document.getElementById('hist-label').textContent = bal < 0 ? 'owes this much' : bal === 0 ? 'all settled up' : 'paid ahead';
  document.getElementById('hist-title').textContent = NAMES[child];
  const list = document.getElementById('entries-list');
  const mine = entries.filter(e => e.child === child);
  if (!mine.length) { list.innerHTML = '<div class="empty">No transactions yet</div>'; return; }
  let html = '', lastMonth = '';
  mine.forEach(e => {
    const d = e.date?.toDate ? e.date.toDate() : new Date(e.date);
    const month = d.toLocaleString('default', { month:'long', year:'numeric' });
    if (month !== lastMonth) { html += `<div class="month-label">${month}</div>`; lastMonth = month; }
    const cls = e.type === 'expense' ? 'exp' : 'pay';
    const amt = e.type === 'expense' ? `-$${e.amount.toFixed(2)}` : `+$${e.amount.toFixed(2)}`;
    const date = d.toLocaleDateString('default', { month:'short', day:'numeric' });
    const desc = e.desc || (e.type === 'expense' ? 'Expense' : 'Payment');
    html += `<div class="entry"><div><div class="entry-desc">${desc}</div><div class="entry-date">${date}</div></div><div class="entry-amt ${cls}">${amt}</div></div>`;
  });
  list.innerHTML = html;
}

function setUser(who) {
  currentUser = who;
  document.getElementById('who-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const badge = document.getElementById('who-badge');
  badge.textContent = who === 'parent' ? 'Parent' : NAMES[who];
  badge.style.background = who==='parent' ? 'var(--parl)' : who==='child1' ? 'var(--c1l)' : 'var(--c2l)';
  badge.style.color = who==='parent' ? 'var(--par)' : who==='child1' ? 'var(--c1)' : 'var(--c2)';
  renderActions();
}
function switchUser() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('who-screen').style.display = 'flex';
}
function openHistory(child) {
  historyChild = child;
  document.getElementById('app').style.display = 'none';
  document.getElementById('history-screen').style.display = 'flex';
  renderHistory(child);
}
function closeHistory() {
  historyChild = null;
  document.getElementById('history-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}
function openExpModal(child) {
  expTarget = child;
  document.getElementById('exp-modal-sub').textContent = `Adding expense for ${NAMES[child]}`;
  document.getElementById('exp-ok').style.background = child==='child1' ? 'var(--c1)' : 'var(--c2)';
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-desc').value = '';
  document.getElementById('exp-modal').classList.add('open');
  setTimeout(() => document.getElementById('exp-amount').focus(), 350);
}
function openPayModal() {
  document.getElementById('pay-amount').value = '';
  document.getElementById('pay-note').value = '';
  document.getElementById('pay-modal').classList.add('open');
  setTimeout(() => document.getElementById('pay-amount').focus(), 350);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function submitExpense() {
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const desc = document.getElementById('exp-desc').value.trim();
  if (!amount || amount <= 0) { toast('Enter a valid amount'); return; }
  const btn = document.getElementById('exp-ok');
  btn.textContent = 'Saving…';
  try {
    await db.collection('family-ledger').doc('data').collection('entries').add({
      child: expTarget, type: 'expense',
      amount: Math.round(amount * 100) / 100,
      desc: desc,
      date: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeModal('exp-modal');
    toast('Expense added ✓');
  } catch(e) { toast('Error: ' + e.message); }
  btn.textContent = 'Add Expense';
}

async function submitPayment() {
  const child = document.getElementById('pay-child').value;
  const amount = parseFloat(document.getElementById('pay-amount').value);
  const note = document.getElementById('pay-note').value.trim();
  if (!amount || amount <= 0) { toast('Enter a valid amount'); return; }
  try {
    await db.collection('family-ledger').doc('data').collection('entries').add({
      child, type: 'payment',
      amount: Math.round(amount * 100) / 100,
      desc: note,
      date: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeModal('pay-modal');
    toast('Payment recorded ✓');
  } catch(e) { toast('Error: ' + e.message); }
}

document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

async function init() {
  try {
    db.collection('family-ledger').doc('data').collection('entries')
      .orderBy('date', 'desc')
      .onSnapshot(snap => {
        entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderBalances();
        if (historyChild) renderHistory(historyChild);
      });
    document.getElementById('loading').style.display = 'none';
    document.getElementById('who-screen').style.display = 'flex';
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="text-align:center;padding:24px">
        <div style="color:#C4432A;font-size:16px;margin-bottom:8px">Connection failed</div>
        <div style="font-size:13px;color:#6B6459">${e.message}</div>
      </div>`;
  }
}
init();
</script>
</body>
</html>
